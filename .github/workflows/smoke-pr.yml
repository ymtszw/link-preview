name: PR Smoke Test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - name: Start development server
        run: npm start &

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8787 > /dev/null; then
              echo "Server is up!"
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done
          echo "Server did not start in time."
          exit 1

      - name: Run smoke.sh against localhost
        run: bash smoke.sh http://localhost:8787
